name: Lint & Format
on:
  push:
    branches:
      - '*'
    paths-ignore:
      - '*.{md,txt}'
      - LICENSE
      - .*config
    tags-ignore:
      - '*'
  pull_request:
    branches:
      - '*'
    paths-ignore:
      - '*.{md,txt}'
      - LICENSE
      - .*config

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository code
        uses: actions/checkout@v7

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          run_install: false

      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm i --frozen-lockfile

      - name: Format check
        run: pnpm format:check

      - name: Lint
        run: pnpm lint
