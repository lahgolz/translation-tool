services:
  pgsql:
    image: 'postgres:alpine'
    ports:
      - '${DB_PORT:-5432}:5432'
    environment:
      PGPASSWORD: '${DB_PGPASSWORD:-secret}'
      POSTGRES_DB: '${DB_DATABASE:-database}'
      POSTGRES_USER: '${DB_USER:-user}'
      POSTGRES_PASSWORD: '${DB_PASSWORD:-password}'
    volumes:
      - 'sailpgsql:/var/lib/postgresql/18/docker'
    networks:
      - sail
    healthcheck:
      test: ['CMD', 'pg_isready', '-q', '-d', '${DB_DATABASE:-database}', '-U', '${DB_USER:-user}']
      retries: 3
      timeout: 5s

  mailpit:
    image: 'axllent/mailpit:latest'
    ports:
      - '${FORWARD_MAILPIT_PORT:-1025}:1025'
      - '${FORWARD_MAILPIT_DASHBOARD_PORT:-8025}:8025'
    networks:
      - sail
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8025/livez']
      interval: 30s
      timeout: 10s
      retries: 5

  minio:
    image: 'minio/minio:latest'
    ports:
      - '${FORWARD_MINIO_PORT:-9000}:9000'
      - '${FORWARD_MINIO_CONSOLE_PORT:-9001}:9001'
    environment:
      MINIO_ROOT_USER: '${AWS_ACCESS_KEY_ID:-minioadmin}'
      MINIO_ROOT_PASSWORD: '${AWS_SECRET_ACCESS_KEY:-minioadmin}'
    volumes:
      - 'sailminio:/data'
    command: server /data --console-address ":9001"
    networks:
      - sail
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 5s
      timeout: 5s
      retries: 5

  minio-init:
    image: 'minio/mc:latest'
    depends_on:
      minio:
        condition: service_healthy
    environment:
      AWS_ACCESS_KEY_ID: '${AWS_ACCESS_KEY_ID:-minioadmin}'
      AWS_SECRET_ACCESS_KEY: '${AWS_SECRET_ACCESS_KEY:-minioadmin}'
      S3_BUCKET: '${S3_BUCKET:-translation-tool}'
    networks:
      - sail
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $$AWS_ACCESS_KEY_ID $$AWS_SECRET_ACCESS_KEY &&
      mc mb --ignore-existing local/$$S3_BUCKET &&
      mc anonymous set download local/$$S3_BUCKET
      "

networks:
  sail:
    driver: bridge

volumes:
  sailpgsql:
  sailminio:
